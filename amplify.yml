version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/.pnpm/**/*
customHeaders:
  - pattern: '/api/graphql'
    headers:
      # TODO: Add your custom headers here (CORS, cache-control, etc.)
